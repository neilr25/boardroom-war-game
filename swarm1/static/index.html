<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swarm1 — LangGraph Boardroom</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#0f0f13;color:#e4e4e7}
.mono{font-family:'JetBrains Mono',monospace}
.agent-card{transition:all .3s ease;border-left:3px solid transparent}
.agent-card.speaking{border-left-color:#3b82f6;background:rgba(59,130,246,.08);transform:scale(1.02)}
.agent-card.thinking{border-left-color:#8b5cf6;background:rgba(139,92,246,.08)}
.msg-bubble{animation:popIn .3s ease}
@keyframes popIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#18181b}
::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:3px}
</style>
</head>
<body class="h-screen overflow-hidden">
<!-- Header -->
<header class="h-14 border-b border-zinc-800 bg-zinc-900/80 backdrop-blur flex items-center justify-between px-6">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 rounded bg-blue-600 flex items-center justify-center text-white font-bold text-sm" id="header-icon">1</div>
    <h1 class="font-semibold text-sm tracking-wide" id="header-title">LANGGRAPH BOARDROOM</h1>
    <span id="conn-status" class="w-2 h-2 rounded-full bg-green-500 pulse"></span>
  </div>
  <div class="flex items-center gap-4 text-xs text-zinc-400">
    <span id="session-badge" class="hidden px-2 py-0.5 rounded bg-zinc-800 text-zinc-300"></span>
    <button onclick="loadSessions()" class="hover:text-white transition">Refresh</button>
  </div>
</header>

<!-- Main -->
<div class="flex h-[calc(100vh-56px)]">
  <!-- Left -->
  <aside class="w-72 border-r border-zinc-800 bg-zinc-900 flex flex-col">
    <div class="p-4 border-b border-zinc-800">
      <h2 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-3">New Deliberation</h2>
      <input id="idea-input" type="text" placeholder="Enter startup idea..."
        class="w-full px-3 py-2 bg-zinc-800 border border-zinc-700 rounded text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-blue-500 mb-2">
      <button onclick="startSession()" id="start-btn"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium py-2 px-4 rounded transition flex items-center justify-center gap-2">
        <span>Start Board</span>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/></svg>
      </button>
    </div>
    <div class="p-4 border-b border-zinc-800">
      <h2 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Past Sessions</h2>
    </div>
    <div id="session-list" class="flex-1 overflow-y-auto p-2 space-y-1">
      <div class="text-center text-xs text-zinc-500 mt-4">Loading...</div>
    </div>
  </aside>

  <!-- Center -->
  <main class="flex-1 flex flex-col bg-zinc-950">
    <div class="h-12 border-b border-zinc-800 bg-zinc-900/50 flex items-center px-4">
      <span class="text-xs text-zinc-500" id="phase-label">No active session</span>
      <span class="ml-auto text-xs text-zinc-600 mono" id="event-count">0 events</span>
    </div>
    <div id="feed" class="flex-1 overflow-y-auto p-4 space-y-2">
      <div class="text-center text-zinc-500 text-sm mt-20">
        <p>Enter a startup idea and click Start Board.</p>
        <p class="text-xs mt-1 text-zinc-600">Agents will deliberate in real-time.</p>
      </div>
    </div>
  </main>

  <!-- Right -->
  <aside class="w-64 border-l border-zinc-800 bg-zinc-900 flex flex-col">
    <div class="p-3 border-b border-zinc-800">
      <h2 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider">Board Members</h2>
    </div>
    <div id="agent-roster" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
    <div class="border-t border-zinc-800 p-3">
      <div class="text-xs text-zinc-500 mb-1">Status</div>
      <div id="status-display" class="text-sm text-zinc-300">Idle</div>
    </div>
  </aside>
</div>

<script>
const AGENTS = {
  board_chair: {name:"Board Chair",emoji:"💼",color:"#f59e0b"},
  ceo:        {name:"CEO",emoji:"🎤",color:"#3b82f6"},
  cfo:        {name:"CFO",emoji:"💰",color:"#10b981"},
  cto:        {name:"CTO",emoji:"💻",color:"#8b5cf6"},
  cro:        {name:"CRO",emoji:"📈",color:"#ec4899"},
  customer:   {name:"Customer",emoji:"🛒",color:"#6366f1"},
  counsel:    {name:"Counsel",emoji:"⚖️",color:"#ef4444"},
};
let eventSource = null;
let eventCount = 0;
let currentSessionId = null;

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Initialise roster
(function initRoster(){
  const el=document.getElementById('agent-roster');
  el.innerHTML='';
  for(const[key,a]of Object.entries(AGENTS)){
    el.innerHTML+=`
      <div id="agent-${key}" class="agent-card rounded px-2 py-2 flex items-center gap-2 cursor-default">
        <span class="text-lg">${a.emoji}</span>
        <div class="flex-1 min-w-0">
          <div class="text-sm font-medium" style="color:${a.color}">${a.name}</div>
          <div class="agent-state text-xs text-zinc-500 hidden">${key}</div>
        </div>
        <span class="state-dot w-2 h-2 rounded-full bg-zinc-600"></span>
      </div>`;
  }
})();

async function loadSessions(){
  const el=document.getElementById('session-list');
  try{
    const r=await fetch('/api/sessions');
    const sessions=await r.json();
    if(!sessions.length){el.innerHTML='<div class="text-xs text-zinc-500 text-center mt-4">No sessions yet</div>';return}
    el.innerHTML=sessions.map(s=>`
      <div onclick="viewSession('${s.session_id}')" class="px-3 py-2 rounded hover:bg-zinc-800 cursor-pointer text-xs">
        <div class="text-zinc-300 mono truncate">${s.session_id}</div>
        <div class="text-zinc-500">${s.event_count||0} events</div>
      </div>`).join('');
  }catch(e){el.innerHTML='<div class="text-xs text-red-400">Error loading</div>'}
}

async function viewSession(sid){
  currentSessionId=sid;
  document.getElementById('session-badge').textContent=sid;
  document.getElementById('session-badge').classList.remove('hidden');
  try{
    const r=await fetch(`/api/session/${sid}`);
    const data=await r.json();
    const feed=document.getElementById('feed');
    feed.innerHTML='';
    eventCount=0;
    (data.events||[]).forEach(ev=>handleEvent(ev));
  }catch(e){console.error(e)}
}

async function startSession(){
  const idea=document.getElementById('idea-input').value.trim();
  if(!idea)return;
  document.getElementById('feed').innerHTML='';
  eventCount=0;
  document.getElementById('status-display').textContent='Starting...';
  document.getElementById('start-btn').disabled=true;
  try{
    const r=await fetch(`/api/start?idea=${encodeURIComponent(idea)}`,{method:'POST'});
    const data=await r.json();
    currentSessionId=data.session_id;
    document.getElementById('session-badge').textContent=data.session_id;
    document.getElementById('session-badge').classList.remove('hidden');
    connectSSE();
  }catch(e){
    document.getElementById('status-display').textContent='Error: '+e.message;
  }
}

function connectSSE(){
  if(eventSource)eventSource.close();
  eventSource=new EventSource('/api/events');
  eventSource.onmessage=function(e){
    const ev=JSON.parse(e.data);
    if(ev.type==='heartbeat')return;
    handleEvent(ev);
  };
  eventSource.onerror=function(){document.getElementById('conn-status').className='w-2 h-2 rounded-full bg-red-500'};
}

function handleEvent(ev){
  eventCount++;
  document.getElementById('event-count').textContent=eventCount+' events';
  const feed=document.getElementById('feed');
  const a=AGENTS[ev.agent||ev.agent_key];
  const ts=(ev.ts||'').split('T')[1]?.substring(0,8)||'';

  if(ev.type==='session_start'){
    feed.innerHTML+=`<div class="text-center my-3"><span class="text-zinc-500 text-xs bg-zinc-800/50 px-3 py-1 rounded-full">🎬 Board called to order — ${esc(ev.idea||'')}</span></div>`;
    document.getElementById('status-display').textContent='Deliberating...';
  }
  else if(ev.type==='phase_start'){
    feed.innerHTML+=`<div class="text-center my-3"><span class="text-zinc-400 text-xs bg-zinc-800/50 px-3 py-1 rounded-full">📋 ${esc(ev.label||ev.phase)}</span></div>`;
    document.getElementById('phase-label').textContent=ev.label||ev.phase;
  }
  else if(ev.type==='agent_think'&&a){
    setAgentState(ev.agent,'thinking');
    feed.innerHTML+=`
      <div class="msg-bubble flex items-start gap-2 pl-3 py-1" style="border-left:3px solid ${a.color}40">
        <span class="text-lg shrink-0">${a.emoji}</span>
        <div class="flex-1 min-w-0">
          <span class="font-semibold text-sm" style="color:${a.color}">${a.name}</span>
          <span class="text-zinc-600 text-xs ml-2">(thinking...)</span>
        </div>
      </div>`;
  }
  else if(ev.type==='agent_say'&&a){
    setAgentState(ev.agent,'speaking');
    const text=ev.message||'';
    feed.innerHTML+=`
      <div class="msg-bubble flex items-start gap-2 pl-3 py-2" style="border-left:3px solid ${a.color}">
        <span class="text-lg shrink-0">${a.emoji}</span>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="font-semibold text-sm" style="color:${a.color}">${a.name}</span>
            <span class="text-zinc-600 text-xs">${ts}</span>
          </div>
          <p class="mt-1 text-sm text-zinc-200 leading-relaxed whitespace-pre-wrap break-words">${esc(text)}</p>
        </div>
      </div>`;
  }
  else if(ev.type==='tool_use'&&a){
    feed.innerHTML+=`
      <div class="msg-bubble flex items-center gap-2 pl-5 py-1 text-xs text-zinc-500">
        <span>${a.emoji}</span>
        <span style="color:${a.color}">${a.name}</span>
        <span>used</span>
        <span class="mono text-zinc-400">${esc(ev.tool)}</span>
        <span class="text-zinc-600">→ ${esc((ev.result||'').substring(0,80))}</span>
      </div>`;
  }
  else if(ev.type==='session_done'){
    document.getElementById('status-display').textContent='Complete';
    document.getElementById('start-btn').disabled=false;
    feed.innerHTML+=`<div class="text-center my-3"><span class="text-emerald-500 text-xs bg-zinc-800/50 px-3 py-1 rounded-full">✅ Deliberation complete</span></div>`;
  }
  feed.scrollTop=feed.scrollHeight;
}

function setAgentState(key,state){
  const el=document.getElementById('agent-'+key);
  if(!el)return;
  el.classList.remove('speaking','thinking');
  el.classList.add(state);
  const dot=el.querySelector('.state-dot');
  if(dot){
    dot.className='state-dot w-2 h-2 rounded-full';
    dot.classList.add(state==='speaking'?'bg-blue-500':'bg-purple-500');
  }
  const stEl=el.querySelector('.agent-state');
  if(stEl){stEl.textContent=state==='speaking'?'Speaking':'Thinking';stEl.classList.remove('hidden')}
  setTimeout(()=>{
    el.classList.remove('speaking','thinking');
    if(dot)dot.className='state-dot w-2 h-2 rounded-full bg-zinc-600';
    if(stEl)stEl.classList.add('hidden');
  },8000);
}

// Init
loadSessions();
</script>
</body>
</html>
